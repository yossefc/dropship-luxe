version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: dropship-postgres-dev
    restart: unless-stopped
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=dropship_luxe_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres-dev-data:/var/lib/postgresql/data
    networks:
      - dropship-dev-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d dropship_luxe_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: dropship-redis-dev
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-dev-data:/data
    networks:
      - dropship-dev-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Commander - GUI for Redis
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: dropship-redis-commander
    restart: unless-stopped
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    ports:
      - "8081:8081"
    depends_on:
      - redis
    networks:
      - dropship-dev-network
    profiles:
      - tools

  # pgAdmin - GUI for PostgreSQL
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: dropship-pgadmin
    restart: unless-stopped
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@dropship.local
      - PGADMIN_DEFAULT_PASSWORD=admin
    ports:
      - "8080:80"
    depends_on:
      - postgres
    networks:
      - dropship-dev-network
    profiles:
      - tools

  # Mailhog - Email testing
  mailhog:
    image: mailhog/mailhog
    container_name: dropship-mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"  # SMTP
      - "8025:8025"  # Web UI
    networks:
      - dropship-dev-network
    profiles:
      - tools

volumes:
  postgres-dev-data:
    driver: local
  redis-dev-data:
    driver: local

networks:
  dropship-dev-network:
    driver: bridge
